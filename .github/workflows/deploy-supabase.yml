name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'src/supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy migrations + Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply database migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Function — report-webhook
        run: supabase functions deploy report-webhook --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function — proph3t-claude
        run: |
          if [ -d "src/supabase/functions/proph3t-claude" ]; then
            # Move into canonical supabase/functions dir for deploy
            mkdir -p supabase/functions/proph3t-claude
            cp -r src/supabase/functions/proph3t-claude/* supabase/functions/proph3t-claude/
            supabase functions deploy proph3t-claude
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
